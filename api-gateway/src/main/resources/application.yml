server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/users/**,/api/auth/**
        - id: event-service
          uri: http://event-service:8080
          predicates:
            - Path=/api/events/**
        - id: booking-service
          uri: http://booking-service:8080
          predicates:
            - Path=/api/bookings/**
        - id: ticket-service
          uri: http://ticket-service:8080
          predicates:
            - Path=/api/tickets/**
        - id: sales-service
          uri: http://sales-service:8080
          predicates:
            - Path=/api/sales/**

jwt:
  secret: ${JWT_SECRET:bWlsZXN0b25lLTItc2hhcmVkLXNlY3JldC0zMi1ieXRlcy1taW4h}
  expiration: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
