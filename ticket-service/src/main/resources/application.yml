spring:
  application:
    name: ticket-service
  datasource:
    url: jdbc:postgresql://postgres:5432/eventticketingdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    mongodb:
      uri: mongodb://root:rootpass@mongo:27017/eventticketingmongo?authSource=admin
    redis:
      host: redis
      port: 6379
      password: redispass
  cassandra:
    contact-points: cassandra
    port: 9042
    local-datacenter: datacenter1
    keyspace-name: eventticketingks
    schema-action: CREATE_IF_NOT_EXISTS

server:
  port: 8084

jwt:
  secret: "7zvE7YVtVltaZG9tcGxleVNlY3JldEtleTEyMzQ1Njc4OQ=="
  expiration: 86400000