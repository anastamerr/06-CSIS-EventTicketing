apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: user-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - user-service.eventticketing.svc.cluster.local:8080
      - job_name: event-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - event-service.eventticketing.svc.cluster.local:8080
      - job_name: booking-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - booking-service.eventticketing.svc.cluster.local:8080
      - job_name: ticket-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - ticket-service.eventticketing.svc.cluster.local:8080
      - job_name: sales-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - sales-service.eventticketing.svc.cluster.local:8080
