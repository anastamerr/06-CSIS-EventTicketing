apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    scrape_configs:
      - job_name: user-service
        static_configs:
          - targets: ['user-service.eventticketing.svc.cluster.local:8080']
        metrics_path: /actuator/prometheus
      - job_name: event-service
        static_configs:
          - targets: ['event-service.eventticketing.svc.cluster.local:8080']
        metrics_path: /actuator/prometheus
      - job_name: booking-service
        static_configs:
          - targets: ['booking-service.eventticketing.svc.cluster.local:8080']
        metrics_path: /actuator/prometheus
      - job_name: ticket-service
        static_configs:
          - targets: ['ticket-service.eventticketing.svc.cluster.local:8080']
        metrics_path: /actuator/prometheus
      - job_name: sales-service
        static_configs:
          - targets: ['sales-service.eventticketing.svc.cluster.local:8080']
        metrics_path: /actuator/prometheus
