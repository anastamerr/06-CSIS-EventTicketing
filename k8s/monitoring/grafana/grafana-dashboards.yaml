apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: Event Ticketing
        orgId: 1
        folder: Event Ticketing
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
