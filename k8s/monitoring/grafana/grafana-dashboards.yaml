apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: Event Ticketing
        orgId: 1
        folder: Event Ticketing
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  namespace: monitoring
data:
  booking-dashboard.json: |
    {
      "title": "Booking Service",
      "uid": "booking-service",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "15s",
      "tags": ["eventticketing", "booking-service"],
      "panels": [
        {
          "id": 1,
          "title": "Booking HTTP Request Rate",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum by (uri, method, status) (rate(http_server_requests_seconds_count{job=\"booking-service\"}[5m]))",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "title": "Booking HTTP P95 Latency",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, uri) (rate(http_server_requests_seconds_bucket{job=\"booking-service\"}[5m])))",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0}
        },
        {
          "id": 3,
          "title": "Booking JVM Heap Used",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "avg_over_time(jvm_memory_used_bytes{job=\"booking-service\", area=\"heap\"}[5m])",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0}
        },
        {
          "id": 4,
          "title": "Booking Error Logs",
          "type": "timeseries",
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "expr": "sum by (level) (count_over_time({app=\"eventticketing\", service=\"booking-service\", level=\"ERROR\"} | json [1m]))",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 8}
        },
        {
          "id": 5,
          "title": "Booking Feign Activity",
          "type": "timeseries",
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "expr": "sum(count_over_time({app=\"eventticketing\", service=\"booking-service\"} | json | message=~\".*Feign.*\" [5m]))",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 8}
        },
        {
          "id": 6,
          "title": "Booking Event Logs",
          "type": "timeseries",
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "expr": "sum(count_over_time({app=\"eventticketing\", service=\"booking-service\"} | json | message=~\".*booking\\\\.(placed|completed|cancelled).*\" [5m]))",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8}
        }
      ]
    }
  event-dashboard.json: |
    {
      "title": "Event Service",
      "uid": "event-service",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "15s",
      "tags": ["eventticketing", "event-service"],
      "panels": [
        {
          "id": 1,
          "title": "Event Service Error Logs",
          "type": "timeseries",
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {"expr": "count_over_time({app=\"eventticketing\", service=\"event-service\", level=\"ERROR\"} | json [1m])"}
          ],
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "title": "Event RabbitMQ Publishes",
          "type": "timeseries",
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {"expr": "sum by (routingKey) (count_over_time({app=\"eventticketing\", service=\"event-service\"} | json | routingKey=~\"event.status-changed|event.rated\" [5m]))"}
          ],
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0}
        },
        {
          "id": 3,
          "title": "Event Feign Outcomes",
          "type": "timeseries",
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {"expr": "sum by (level) (count_over_time({app=\"eventticketing\", service=\"event-service\"} | json | message=~\".*Feign.*\" [5m]))"}
          ],
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0}
        },
        {
          "id": 4,
          "title": "Event HTTP Request Rate",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum by (uri, method) (rate(http_server_requests_seconds_count{job=\"event-service\"}[5m]))"}
          ],
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 8}
        },
        {
          "id": 5,
          "title": "Event HTTP P95 Latency",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum by (le, uri) (rate(http_server_requests_seconds_bucket{job=\"event-service\"}[5m])))"}
          ],
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 8}
        },
        {
          "id": 6,
          "title": "Event JVM Heap Used",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "avg_over_time(jvm_memory_used_bytes{job=\"event-service\", area=\"heap\"}[5m])"}
          ],
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8}
        }
      ]
    }
  sales-dashboard.json: |
    {
      "title": "Sales Service",
      "uid": "sales-service",
      "schemaVersion": 39,
      "version": 1,
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "title": "HTTP Request Rate",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"sales-service\"}[5m]))",
              "legendFormat": "requests/sec"
            }
          ],
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "title": "HTTP P95 Latency",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job=\"sales-service\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ],
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0}
        },
        {
          "id": 3,
          "title": "JVM Memory Used",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum by (area) (avg_over_time(jvm_memory_used_bytes{job=\"sales-service\"}[5m]))",
              "legendFormat": "{{area}}"
            }
          ],
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0}
        },
        {
          "id": 4,
          "title": "Saga Payment Events",
          "type": "timeseries",
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "expr": "sum by (routingKey) (count_over_time({app=\"eventticketing\", service=\"sales-service\"} | json | routingKey=~\"payment\\\\..*\" [5m]))"
            }
          ],
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 8}
        },
        {
          "id": 5,
          "title": "Booking Event Consumption",
          "type": "timeseries",
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "expr": "sum by (routingKey) (count_over_time({app=\"eventticketing\", service=\"sales-service\"} | json | routingKey=~\"booking\\\\.completed|booking\\\\.cancelled\" [5m]))"
            }
          ],
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 8}
        },
        {
          "id": 6,
          "title": "Sales Errors",
          "type": "timeseries",
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "expr": "sum by (level) (count_over_time({app=\"eventticketing\", service=\"sales-service\", level=\"ERROR\"} | json [1m]))"
            }
          ],
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8}
        }
      ]
    }
  ticket-dashboard.json: |
    {
      "title": "Ticket Service",
      "uid": "ticket-service",
      "schemaVersion": 39,
      "version": 1,
      "tags": ["eventticketing", "ticket-service"],
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "corrId",
            "type": "textbox",
            "label": "Correlation ID",
            "current": { "value": ".*", "text": ".*" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Error rate (ERRORs/min)",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum by (service) (count_over_time({app=\"eventticketing\", service=\"ticket-service\", level=\"ERROR\"} | json [1m]))",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Correlation ID trace",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum by (service) (count_over_time({app=\"eventticketing\"} | json | correlationId=~\"$corrId\" [5m]))",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Ticket RabbitMQ routing keys (5m)",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum by (routingKey) (count_over_time({app=\"eventticketing\", service=\"ticket-service\"} | json | routingKey=~\"ticket\\\\..*\"[5m]))",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "HTTP request rate by URI",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "targets": [
            {
              "expr": "sum by (uri) (rate(http_server_requests_seconds_count{job=\"ticket-service\"}[5m]))",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "P99 latency on /api/tickets/**",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (le, uri) (rate(http_server_requests_seconds_bucket{job=\"ticket-service\", uri=~\"/api/tickets.*\"}[5m])))",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "JVM heap usage ratio",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 28 },
          "targets": [
            {
              "expr": "sum by (area) (avg_over_time(jvm_memory_used_bytes{job=\"ticket-service\"}[5m])) / sum by (area) (avg_over_time(jvm_memory_max_bytes{job=\"ticket-service\"}[5m]))",
              "refId": "A"
            }
          ]
        }
      ]
    }
  user-dashboard.json: |
    {
      "title": "User Service",
      "uid": "user-service",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "User Service Errors",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "sum by (service) (count_over_time({app=\"eventticketing\", service=\"user-service\", level=\"ERROR\"} | json [1m]))",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Booking Feign Calls",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "sum(count_over_time({app=\"eventticketing\", service=\"user-service\"} | json | message=~\".*Booking service.*\" [5m]))",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "RabbitMQ User Events",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "sum by (routingKey) (count_over_time({app=\"eventticketing\", service=\"user-service\"} | json | routingKey=~\"user\\\\.registered|user\\\\.deactivated\" [5m]))",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "logs",
          "title": "Booking Saga Consumer Logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "sum by (routingKey) (count_over_time({app=\"eventticketing\", service=\"user-service\"} | json | routingKey=~\"booking\\\\.completed|booking\\\\.cancelled\" [5m]))",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "HTTP Request Rate",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (uri, method) (rate(http_server_requests_seconds_count{job=\"user-service\"}[5m]))",
              "refId": "A",
              "legendFormat": "{{method}} {{uri}}"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "HTTP Latency P95 / P99",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, uri) (rate(http_server_requests_seconds_bucket{job=\"user-service\"}[5m])))",
              "refId": "A",
              "legendFormat": "p95 {{uri}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le, uri) (rate(http_server_requests_seconds_bucket{job=\"user-service\"}[5m])))",
              "refId": "B",
              "legendFormat": "p99 {{uri}}"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "JVM Heap Usage",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "avg_over_time(jvm_memory_used_bytes{job=\"user-service\", area=\"heap\"}[5m])",
              "refId": "A",
              "legendFormat": "heap used"
            },
            {
              "expr": "avg_over_time(jvm_memory_max_bytes{job=\"user-service\", area=\"heap\"}[5m])",
              "refId": "B",
              "legendFormat": "heap max"
            }
          ]
        }
      ]
    }
