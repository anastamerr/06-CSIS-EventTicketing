apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: Event Ticketing
        orgId: 1
        folder: Event Ticketing
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards
  user-dashboard.json: |
    {
      "title": "User Service Placeholder",
      "uid": "user-service-placeholder",
      "schemaVersion": 39,
      "version": 0,
      "panels": []
    }
  event-dashboard.json: |
    {
      "title": "Event Service",
      "uid": "event-service",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "15s",
      "tags": ["eventticketing", "event-service"],
      "panels": [
        {
          "id": 1,
          "title": "Event Service Error Logs",
          "type": "timeseries",
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {"expr": "count_over_time({app=\"eventticketing\", service=\"event-service\", level=\"ERROR\"} | json [1m])"}
          ],
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "title": "Event RabbitMQ Publishes",
          "type": "timeseries",
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {"expr": "sum by (routingKey) (count_over_time({app=\"eventticketing\", service=\"event-service\"} | json | routingKey=~\"event.status-changed|event.rated\" [5m]))"}
          ],
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0}
        },
        {
          "id": 3,
          "title": "Event Feign Outcomes",
          "type": "timeseries",
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {"expr": "sum by (level) (count_over_time({app=\"eventticketing\", service=\"event-service\"} | json | message=~\".*Feign.*\" [5m]))"}
          ],
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0}
        },
        {
          "id": 4,
          "title": "Event HTTP Request Rate",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum by (uri, method) (rate(http_server_requests_seconds_count{job=\"event-service\"}[5m]))"}
          ],
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 8}
        },
        {
          "id": 5,
          "title": "Event HTTP P95 Latency",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum by (le, uri) (rate(http_server_requests_seconds_bucket{job=\"event-service\"}[5m])))"}
          ],
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 8}
        },
        {
          "id": 6,
          "title": "Event JVM Heap Used",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(jvm_memory_used_bytes{job=\"event-service\", area=\"heap\"})"}
          ],
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8}
        }
      ]
    }
  booking-dashboard.json: |
    {
      "title": "Booking Service",
      "uid": "booking-service",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "type": "logs",
          "title": "Booking Errors",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            { "expr": "{service=\"booking-service\"} |= \"ERROR\"", "refId": "A" }
          ]
        },
        {
          "id": 2,
          "type": "logs",
          "title": "Feign Calls",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            { "expr": "{service=\"booking-service\"} |= \"Feign\"", "refId": "A" }
          ]
        },
        {
          "id": 3,
          "type": "logs",
          "title": "Booking Events",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            { "expr": "{service=\"booking-service\"} |~ \"booking\\\\.(placed|completed|cancelled)\"", "refId": "A" }
          ]
        }
      ]
    }
  ticket-dashboard.json: |
    {
      "title": "Ticket Service Placeholder",
      "uid": "ticket-service-placeholder",
      "schemaVersion": 39,
      "version": 0,
      "panels": []
    }
  sales-dashboard.json: |
    {
      "title": "Sales Service Placeholder",
      "uid": "sales-service-placeholder",
      "schemaVersion": 39,
      "version": 0,
      "panels": []
    }
