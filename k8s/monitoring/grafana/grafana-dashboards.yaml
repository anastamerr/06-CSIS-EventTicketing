apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  dashboardproviders.yaml: |
    apiVersion: 1
    providers:
      - name: event-ticketing
        orgId: 1
        folder: Event Ticketing
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/provisioning/dashboards
  user-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "targets": [
            {
              "expr": "sum by (method, uri) (rate(http_server_requests_seconds_count{job=\"user-service\"}[5m]))",
              "legendFormat": "{{method}} {{uri}}",
              "refId": "A"
            }
          ],
          "title": "User HTTP Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, uri) (rate(http_server_requests_seconds_bucket{job=\"user-service\"}[5m])))",
              "legendFormat": "p95 {{uri}}",
              "refId": "A"
            }
          ],
          "title": "User HTTP P95 Latency",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "targets": [
            {
              "expr": "jvm_memory_used_bytes{job=\"user-service\", area=\"heap\"}",
              "legendFormat": "{{id}}",
              "refId": "A"
            }
          ],
          "title": "User JVM Heap Usage",
          "type": "timeseries"
        },
        {
          "datasource": "Loki",
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "targets": [
            {
              "expr": "sum by (level) (count_over_time({app=\"eventticketing\", service=\"user-service\"}[5m]))",
              "legendFormat": "{{level}}",
              "refId": "A"
            }
          ],
          "title": "User Service Log Volume",
          "type": "timeseries"
        },
        {
          "datasource": "Loki",
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "id": 5,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "targets": [
            {
              "expr": "sum by (level) (count_over_time({app=\"eventticketing\", service=\"user-service\"} |= \"Unauthorized\" [15m]))",
              "legendFormat": "{{level}} auth failures",
              "refId": "A"
            }
          ],
          "title": "User Auth Failures",
          "type": "timeseries"
        },
        {
          "datasource": "Loki",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "id": 6,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{app=\"eventticketing\", service=\"user-service\"} | json",
              "refId": "A"
            }
          ],
          "title": "Recent User-Service Logs",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 41,
      "style": "dark",
      "tags": [
        "event-ticketing",
        "user-service",
        "m3"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "title": "User Service Dashboard",
      "uid": "user-service-dashboard",
      "version": 1
    }
