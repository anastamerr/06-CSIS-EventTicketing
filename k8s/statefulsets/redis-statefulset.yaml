apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: eventticketing
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2
          ports:
            - name: redis
              containerPort: 6379
          command: ["redis-server"]
          args:
            - --appendonly
            - "yes"
            - --requirepass
            - redispass
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          volumeMounts:
            - name: redis-storage
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
