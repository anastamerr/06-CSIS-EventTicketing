apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: eventticketing
spec:
  serviceName: cassandra
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      containers:
        - name: cassandra
          image: cassandra:4.1
          ports:
            - name: cql
              containerPort: 9042
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: eventticketingcluster
            - name: CASSANDRA_DC
              value: datacenter1
            - name: MAX_HEAP_SIZE
              value: 256M
            - name: HEAP_NEWSIZE
              value: 64M
            - name: JVM_EXTRA_OPTS
              value: -XX:MaxDirectMemorySize=128M
          volumeMounts:
            - name: data
              mountPath: /var/lib/cassandra
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
