# Placeholder for the M3 booking-service Deployment manifest.
# Populate according to M3.md when the booking-service slice is implemented.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: eventticketing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: booking-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: booking-service-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: booking-postgres-secret
                  key: POSTGRES_PASSWORD