services:
  postgres:
    image: postgres:17
    container_name: eventticketing-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventticketingdb
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventticketingdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo:
    image: mongo:latest
    container_name: eventticketing-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
      MONGO_INITDB_DATABASE: eventticketingmongo
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: eventticketing-redis
    command: redis-server --requirepass redispass --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: eventticketing-rabbitmq
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: elasticsearch:9.2.5
    container_name: eventticketing-elasticsearch
    hostname: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms256m -Xmx256m
    ports:
      - "${ELASTICSEARCH_HOST_PORT:-9200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  neo4j:
    image: neo4j:latest
    container_name: eventticketing-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
      NEO4J_server_memory_heap_max__size: 256m
      NEO4J_server_memory_heap_initial__size: 128m
      NEO4J_server_memory_pagecache_size: 128m
    ports:
      - "${NEO4J_HTTP_HOST_PORT:-7474}:7474"
      - "${NEO4J_BOLT_HOST_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  cassandra:
    image: cassandra:4.1
    container_name: eventticketing-cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: eventticketingcluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_KEYSPACE: eventticketingks
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
      JVM_EXTRA_OPTS: -XX:MaxDirectMemorySize=256M
    ports:
      - "${CASSANDRA_HOST_PORT:-9042}:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e \"DESCRIBE KEYSPACES\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  user-service:
    build: ./user-service
    container_name: eventticketing-user-service
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: -Xms96m -Xmx256m
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eventticketingdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_MONGODB_URI: mongodb://root:rootpass@mongo:27017/eventticketingmongo?authSource=admin
      SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/eventticketingmongo?authSource=admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redispass
      JWT_SECRET: bWlsZXN0b25lLTItc2hhcmVkLXNlY3JldC0zMi1ieXRlcy1taW4h
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "${USER_SERVICE_HOST_PORT:-8081}:8080"

  event-service:
    build: ./event-service
    container_name: eventticketing-event-service
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: -Xms96m -Xmx256m
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eventticketingdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_MONGODB_URI: mongodb://root:rootpass@mongo:27017/eventticketingmongo?authSource=admin
      SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/eventticketingmongo?authSource=admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redispass
      SPRING_RABBITMQ_HOST: rabbitmq
      FEIGN_BOOKING_SERVICE_URL: http://booking-service:8080
      FEIGN_USER_SERVICE_URL: http://user-service:8080
      FEIGN_TICKET_SERVICE_URL: http://ticket-service:8080
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      JWT_SECRET: bWlsZXN0b25lLTItc2hhcmVkLXNlY3JldC0zMi1ieXRlcy1taW4h
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "${EVENT_SERVICE_HOST_PORT:-8082}:8080"

  booking-service:
    build: ./booking-service
    container_name: eventticketing-booking-service
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: -Xms96m -Xmx256m
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eventticketingdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_MONGODB_URI: mongodb://root:rootpass@mongo:27017/eventticketingmongo?authSource=admin
      SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/eventticketingmongo?authSource=admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redispass
      SPRING_DATA_NEO4J_URI: bolt://neo4j:7687
      SPRING_DATA_NEO4J_USERNAME: neo4j
      SPRING_DATA_NEO4J_PASSWORD: neo4jpass
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: neo4jpass
      JWT_SECRET: bWlsZXN0b25lLTItc2hhcmVkLXNlY3JldC0zMi1ieXRlcy1taW4h
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "${BOOKING_SERVICE_HOST_PORT:-8083}:8080"

  ticket-service:
    build: ./ticket-service
    container_name: eventticketing-ticket-service
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: -Xms96m -Xmx256m
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eventticketingdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_MONGODB_URI: mongodb://root:rootpass@mongo:27017/eventticketingmongo?authSource=admin
      SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/eventticketingmongo?authSource=admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redispass
      SPRING_CASSANDRA_CONTACT_POINTS: cassandra
      SPRING_CASSANDRA_PORT: 9042
      SPRING_CASSANDRA_LOCAL_DATACENTER: datacenter1
      SPRING_CASSANDRA_SCHEMA_ACTION: CREATE_IF_NOT_EXISTS
      JWT_SECRET: bWlsZXN0b25lLTItc2hhcmVkLXNlY3JldC0zMi1ieXRlcy1taW4h
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "${TICKET_SERVICE_HOST_PORT:-8084}:8080"

  sales-service:
    build: ./sales-service
    container_name: eventticketing-sales-service
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: -Xms96m -Xmx256m
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eventticketingdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_MONGODB_URI: mongodb://root:rootpass@mongo:27017/eventticketingmongo?authSource=admin
      SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/eventticketingmongo?authSource=admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redispass
      JWT_SECRET: bWlsZXN0b25lLTItc2hhcmVkLXNlY3JldC0zMi1ieXRlcy1taW4h
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "${SALES_SERVICE_HOST_PORT:-8085}:8080"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: eventticketing-api-gateway
    depends_on:
      - user-service
      - event-service
      - booking-service
      - ticket-service
      - sales-service
    environment:
      JAVA_TOOL_OPTIONS: -Xms96m -Xmx256m
      JWT_SECRET: bWlsZXN0b25lLTItc2hhcmVkLXNlY3JldC0zMi1ieXRlcy1taW4h
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "${API_GATEWAY_HOST_PORT:-30080}:8080"

volumes:
  pgdata:
  mongo-data:
  rabbitmq-data:
  es-data:
  neo4j-data:
  cassandra-data:
